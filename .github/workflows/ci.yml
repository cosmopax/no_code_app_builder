name: CI
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: services/web/package-lock.json

      - name: Install web dependencies
        run: cd services/web && npm ci

      - name: Check types
        run: cd services/web && npm run typecheck

      - name: Lint web
        run: cd services/web && npm run lint

      - name: Build web
        run: cd services/web && npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'services/api/requirements.txt'

      - name: Install API dependencies
        run: pip install -r services/api/requirements.txt

      - name: Test API
        run: pytest services/api/
